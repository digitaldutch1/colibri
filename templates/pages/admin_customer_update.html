{% extends "layouts/admin_layout.html" %}
{% block content %}

<!-- Admin booking update step 2 form -->
<div class="booking-wrapper">
    <div class="booking-card">
        <h2 class="booking-title">
            {{ self.i18n("admin-booking-update-step2-title") }}
        </h2>

        <form class="booking-form" method="post">

            <!-- First name -->
            <div class="form-group">
                <label>
                    {{ self.i18n("admin-booking-update-firstname") }}
                </label>
                <input type="text" name="first_name" class="form-input" value="{{ first_name }}" required>
            </div>

            <!-- Last name -->
            <div class="form-group">
                <label>
                    {{ self.i18n("admin-booking-update-lastname") }}
                </label>
                <input type="text" name="last_name" class="form-input" value="{{ last_name }}" required>
            </div>

            <!-- Address -->
            <div class="form-group">
                <label>
                    {{ self.i18n("admin-booking-update-address") }}
                </label>
                <input type="text" name="address" class="form-input" value="{{ address }}" required>
            </div>

            <!-- Zip + city -->
            <div class="form-row">
                <div class="form-group half">
                    <label>
                        {{ self.i18n("admin-booking-update-zipcode") }}
                    </label>
                    <input type="text" name="zip_code" class="form-input" value="{{ zip_code }}" required>
                </div>

                <div class="form-group half">
                    <label>
                        {{ self.i18n("admin-booking-update-city") }}
                    </label>
                    <input type="text" name="city" class="form-input" value="{{ city }}" required>
                </div>
            </div>

            <!-- Phone -->
            <div class="form-group">
                <label>
                    {{ self.i18n("admin-booking-update-phone") }}
                </label>
                <input type="text" name="phone" class="form-input" value="{{ phone }}" required>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label>
                    {{ self.i18n("admin-booking-update-email") }}
                </label>
                <input type="email" name="email" class="form-input" value="{{ email }}" required>
            </div>

            <!-- Buttons -->
            <div class="booking-buttons">

                <button type="button" onclick="window.history.back()" class="btn-secondary">
                    {{ self.i18n("admin-booking-update-back") }}
                </button>

                <button type="submit" class="btn-primary">
                    {{ self.i18n("admin-booking-update-save") }}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
