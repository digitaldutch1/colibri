{% extends "layouts/admin_layout.html" %}
{% block content %}

<div class="booking-wrapper">
    <div class="booking-card">

        <!-- Input validation alerts -->
        {% if !error.is_empty() %}
            <div class="alert error">
                {{ self.i18n(error) }}
            </div>
        {% endif %}

        <h2 class="booking-title">
            {{ self.i18n("admin-customer-update-title") }}
        </h2>

        <form class="booking-form" action="/admin/customer/update/save" method="post">

            <input type="hidden" name="customer_id" value="{{ customer_id }}">
            
            <!-- First name -->
            <div class="form-group">
                <label>
                    {{ self.i18n("admin-customer-create-firstname") }}
                </label>
                <input type="text" name="first_name" class="form-input" value="{{ first_name }}" required>
            </div>

            <!-- Last name -->
            <div class="form-group">
                <label>
                    {{ self.i18n("admin-customer-create-lastname") }}
                </label>
                <input type="text" name="last_name" class="form-input" value="{{ last_name }}" required>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label>
                    {{ self.i18n("admin-customer-create-email") }}
                </label>
                <input type="email" name="email" class="form-input" value="{{ email }}" required>
            </div>

            <!-- Phone -->
            <div class="form-group">
                <label>
                    {{ self.i18n("admin-customer-create-phone") }}
                </label>
                <input type="text" name="phone" class="form-input" value="{{ phone }}" required>
            </div>

            <!-- Address -->
            <div class="form-group">
                <label>
                    {{ self.i18n("admin-customer-create-address") }}
                </label>
                <input type="text" name="address" class="form-input" value="{{ address }}" required>
            </div>

            <!-- Postal code -->
            <div class="form-group">
                <label>
                    {{ self.i18n("admin-customer-create-postalcode") }}
                </label>
                <input type="text" name="postal_code" class="form-input" value="{{ postal_code }}" required>
            </div>

            <!-- City -->
            <div class="form-group">
                <label>
                    {{ self.i18n("admin-customer-create-city") }}
                </label>
                <input type="text" name="city" class="form-input" value="{{ city }}" required>
            </div>

            <!-- Buttons -->
            <div class="booking-buttons">
                <button type="button" onclick="window.location.href='/admin/customers'" class="btn-secondary">
                    {{ self.i18n("admin-customer-create-back") }}
                </button>

                <button type="submit" class="btn-primary">
                    {{ self.i18n("admin-customer-update-save") }}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
