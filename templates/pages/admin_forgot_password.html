{% extends "layouts/admin_layout.html" %}
{% block content %}

<div class="forgot-password-container">
    <div class="forgot-password-card">

        <form method="POST" action="/admin/forgot-password">

            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <!-- -->
            {% if !success.is_empty() %}
                <div class="alert-wrapper">
                    <div class="alert success">
                        {{ self.i18n(success) }}
                    </div>
                </div>
            {% endif %}

            {% if !error.is_empty() %}
                <div class="alert-wrapper">
                    <div class="alert error">
                        {{ self.i18n(error) }}
                    </div>
                </div>
            {% endif %}

            <h1>
                {{ self.i18n("forgot-password-title") }}
            </h1>

            <div class="forgot-password-input-field">
                <input type="text" name="email" value="{{ email }}" placeholder="{{ self.i18n("forgot-password-email") }}">
            </div>

            <button type="submit" class="forgot-password-button">
                {{ self.i18n("forgot-password-submit") }}
            </button>

            <div class="forgot-password-back">
                <a href="/admin/login">
                    {{ self.i18n("forgot-password-back") }}
                </a>
            </div>

        </form>

    </div>
</div>

{% endblock %}
