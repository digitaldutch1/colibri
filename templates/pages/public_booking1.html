{% extends "layouts/public_layout.html" %}
{% block content %}

<!-- Session expired message -->
{% if error == "booking_session_expired" %}
    <div class="alert-wrapper">
        <div class="alert error">
            {{ self.i18n("booking-session-expired") }}
        </div>
    </div>
{% endif %}

<!-- Public booking 1 form  -->
<div class="booking-wrapper">
    <div class="booking-card">
        <h2 class="booking-title">{{ self.i18n("booking-title-step1") }}</h2>
        <form class="booking-form" action="/booking/start" method="post">

            <!-- CSRF token -->
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <!-- Public booking 1 form -->
            <div class="form-group">
                <label for="accommodation">{{ self.i18n("booking-label-accommodation") }}</label>
                <select name="accommodation_id" class="form-input">
                    <option value="">{{ self.i18n("booking-option-default") }}</option>

                    <option value="1" {% if accommodation_id == "1" %}selected{% endif %}>
                        {{ self.i18n("home-chalet-title") }}
                    </option>

                    <option value="2" {% if accommodation_id == "2" %}selected{% endif %}>
                        {{ self.i18n("home-tent-title") }}
                    </option>

                    <option value="3" {% if accommodation_id == "3" %}selected{% endif %}>
                        {{ self.i18n("home-pitch-title") }}
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label>{{ self.i18n("booking-label-checkin") }}</label>
                <input type="text" name="check_in_date" class="form-input" value="" onclick="this.showPicker()">
            </div>

            <div class="form-group">
                <label>{{ self.i18n("booking-label-checkout") }}</label>
                <input type="text" name="check_out_date" class="form-input" value="" onclick="this.showPicker()">
            </div>

            <!-- Public booking 1 buttons -->
            <div class="booking-buttons">
                <button type="button" onclick="window.location.href='/'" class="btn-primary">
                    {{ self.i18n("booking-btn-back") }}
                </button>
                <button id="submit-btn" type="submit" class="btn-primary" disabled>
                    {{ self.i18n("booking-btn-next") }}
                </button>
            </div>
        </form>
    </div>
</div>    

<!-- Booking step 1 form validation Checks if all fields have a value-->
<script>
    function validateBookingStep1Form() {
        const accommodation = document.querySelector('[name="accommodation_id"]');
        const checkInInput = document.querySelector('[name="check_in_date"]');
        const checkOutInput = document.querySelector('[name="check_out_date"]');
        const submitBtn = document.getElementById("submit-btn");

        const valid =
            accommodation.value !== "" &&
            checkInInput.value !== "" &&
            checkOutInput.value !== "";

        submitBtn.disabled = !valid;
    }
</script>

<!-- Booking step 1 calendar availability -->
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const accommodation = document.querySelector('[name="accommodation_id"]');
        const checkInInput = document.querySelector('[name="check_in_date"]');
        const checkOutInput = document.querySelector('[name="check_out_date"]');

        let checkInPicker;
        let checkOutPicker;

        const calendarConfig = {
            locale: "nl",
            dateFormat: "Y-m-d",
            altInput: true,
            altFormat: "d-m-Y",
            minDate: "today",
            disable: [],

            onDayCreate: function (_dObj, _dStr, _fp, dayElem) {
                if (
                    dayElem.classList.contains("prevMonthDay") ||
                    dayElem.classList.contains("nextMonthDay")
                ) {
                    dayElem.style.visibility = "hidden";
                    dayElem.style.pointerEvents = "none";
                }
            },

            onChange: function (_selectedDates, dateStr, instance) {
                if (instance === checkInPicker && checkOutPicker) {
                    
                    const nextDay = new Date(dateStr);
                    nextDay.setDate(nextDay.getDate() + 1);

                    checkOutPicker.set("minDate", nextDay);

                    if (checkOutInput.value && checkOutInput.value <= dateStr) {
                        checkOutPicker.clear();
                    }
                }

                validateBookingStep1Form();
            }
        };

        checkInPicker = flatpickr(checkInInput, calendarConfig);
        checkOutPicker = flatpickr(checkOutInput, calendarConfig);

        async function loadUnavailableDates() {
            const accommodationId = accommodation.value;

            if (!accommodationId) {
                checkInPicker.set("disable", []);
                checkOutPicker.set("disable", []);
                validateBookingStep1Form();
                return;
            }

            try {
                const response = await fetch(`/api/unavailable/${accommodationId}`);
                const unavailableDates = await response.json();

                checkInPicker.set("disable", unavailableDates);
                checkOutPicker.set("disable", unavailableDates);

                if (unavailableDates.includes(checkInInput.value)) {
                    checkInPicker.clear();
                }

                if (unavailableDates.includes(checkOutInput.value)) {
                    checkOutPicker.clear();
                }

                validateBookingStep1Form();
            } catch (error) {
                console.error("Failed to load unavailable dates:", error);
            }
        }

        accommodation.addEventListener("change", loadUnavailableDates);

        // Refresh availability every 5 seconds
        setInterval(loadUnavailableDates, 5000);
        loadUnavailableDates();
        validateBookingStep1Form();
    });
</script>

{% endblock %}
