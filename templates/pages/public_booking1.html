{% extends "layouts/public_layout.html" %}

{% block content %}
    <div class="booking-wrapper">
        <div class="booking-card">
            <h2 class="booking-title">{{ self.i18n("booking-title-step1") }}</h2>

            <form class="booking-form" action="/booking2" method="get">
                <div class="form-group">
                    <label for="accommodation">{{ self.i18n("booking-label-accommodation") }}</label>
                    <select name="accommodation_id" class="form-input">
                        <option value="">{{ self.i18n("booking-option-default") }}</option>

                        <option value="1" {% if accommodation_id == "1" %}selected{% endif %}>
                            {{ self.i18n("home-chalet-title") }}
                        </option>

                        <option value="2" {% if accommodation_id == "2" %}selected{% endif %}>
                            {{ self.i18n("home-tent-title") }}
                        </option>

                        <option value="3" {% if accommodation_id == "3" %}selected{% endif %}>
                            {{ self.i18n("home-pitch-title") }}
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label>{{ self.i18n("booking-label-checkin") }}</label>
                    <input type="text" name="check_in_date" class="form-input" value="" onclick="this.showPicker()">
                </div>

                <div class="form-group">
                    <label>{{ self.i18n("booking-label-checkout") }}</label>
                    <input type="text" name="check_out_date" class="form-input" value="" onclick="this.showPicker()">
                </div>

                <div class="booking-buttons">
                    <button type="button" onclick="window.location.href='/'" class="btn-primary">
                        {{ self.i18n("booking-btn-back") }}
                    </button>
                    <button id="submit-btn" type="submit" class="btn-primary" disabled>
                        {{ self.i18n("booking-btn-next") }}
                    </button>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
