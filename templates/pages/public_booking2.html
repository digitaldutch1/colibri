{% extends "layouts/public_layout.html" %}

{% block content %}
    <div class="booking-wrapper">

        <div class="booking-card">

            <h2 class="booking-title">Boeking - Public 2</h2>

            <form class="booking-form" action="/booking/create" method="post">
                <input type="hidden" name="csrf_token" value="">

                <div class="form-group">
                    <label>Naam</label>
                    <input type="text" name="first_name" value="" class="form-input">
                </div>

                <div class="form-group">
                    <label>Achternaam</label>
                    <input type="text" name="last_name" value="" class="form-input">
                </div>

                <div class="form-group">
                    <label>Adres</label>
                    <input type="text" name="address" value="" class="form-input"> 
                </div>

                <div class="form-row">
                    <div class="form-group half">
                        <label>Postcode</label>
                        <input type="text" name="zip_code" value="" class="form-input">
                    </div>

                    <div class="form-group half">
                        <label>Plaats</label>
                        <input type="text" name="city" value="" class="form-input">
                    </div>
                </div>

                <div class="form-group">
                    <label>Telefoonnummer</label>
                    <input type="text" name="phone" value="" class="form-input">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" value="" class="form-input">
                </div>

                <div class="tos-check-wrapper">
                    <label class="tos-check">
                        <input type="checkbox" id="tosCheck">
                        Ik ga akkoord met de 
                        <a href="/tos" target="_blank">algemene voorwaarden</a>
                    </label>
                </div>           

                <div class="booking-buttons">
                    <button type="button" class="btn-secondary">
                        Terug
                    </button>

                    <button type="submit" id="submit-btn" class="btn-primary" disabled>
                        Boeken
                    </button>
                </div>

            </form>
        </div>

    </div>
{% endblock %}
