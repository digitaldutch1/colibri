{% extends "layouts/public_layout.html" %}

{% block content %}
    <div class="booking-wrapper">
        <div class="booking-card">

            <h2 class="booking-title">{{ self.i18n("booking-title-step2") }}</h2>

            <form class="booking-form" action="/booking/create" method="post">
                <input type="hidden" name="csrf_token" value="">

                <div class="form-group">
                    <label>{{ self.i18n("booking-label-firstname") }}</label>
                    <input type="text" name="first_name" value="" class="form-input">
                </div>

                <div class="form-group">
                    <label>{{ self.i18n("booking-label-lastname") }}</label>
                    <input type="text" name="last_name" value="" class="form-input">
                </div>

                <div class="form-group">
                    <label>{{ self.i18n("booking-label-address") }}</label>
                    <input type="text" name="address" value="" class="form-input"> 
                </div>

                <div class="form-row">
                    <div class="form-group half">
                        <label>{{ self.i18n("booking-label-zipcode") }}</label>
                        <input type="text" name="zip_code" value="" class="form-input">
                    </div>

                    <div class="form-group half">
                        <label>{{ self.i18n("booking-label-city") }}</label>
                        <input type="text" name="city" value="" class="form-input">
                    </div>
                </div>

                <div class="form-group">
                    <label>{{ self.i18n("booking-label-phone") }}</label>
                    <input type="text" name="phone" value="" class="form-input">
                </div>

                <div class="form-group">
                    <label>{{ self.i18n("booking-label-email") }}</label>
                    <input type="email" name="email" value="" class="form-input">
                </div>

                <div class="tos-check-wrapper">
                    <label class="tos-check">
                        <input type="checkbox" id="tosCheck">
                        {{ self.i18n("booking-tos-agree") }} 
                        <a href="/tos" target="_blank">{{ self.i18n("booking-tos-link") }}</a>
                    </label>
                </div>           

                <div class="booking-buttons">
                    <button type="button" class="btn-secondary" onclick="window.history.back()">
                        {{ self.i18n("booking-btn-back") }}
                    </button>

                    <button type="submit" id="submit-btn" class="btn-primary" disabled>
                        {{ self.i18n("home-btn-book") }}
                    </button>
                </div>

            </form>
        </div>
    </div>
{% endblock %}
